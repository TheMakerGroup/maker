tasks:
  build:
    input:
      - main.c
    output:
      - final
    cmd:
      - gcc -Wall -Wextra -O2 -o final main.c #Build command

  clean:
    input: []
    output: []
    cmd:
      - echo Cleaning up...
      - rm -f final

  run:
    input: []
    output: []
    cmd:
      - echo Running the program...
      - ./final
  
  default:
    input: []
    output: []
    cmd:
      - tasks.build
      - tasks.run
