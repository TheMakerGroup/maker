tasks:
  build:
  #These arguments require list.
    depend: []
    input: [main.c] #Note: This is only used to check files.
    output: [final]
    cmd:
      - gcc -Wall -Wextra -O2 -o final main.c #Build command
  run: #This style is in support. The maker will fallback to legacy.
    - echo Running...
    - ./final
  #Explands to:
# run:
#   depend: []
#   input: []
#   output: []
#   cmd:
#   - echo Running...
#   - ./final
  
  
  default:
    depend: [build] #Note: avoid using "tasks." here.
    input: []
    output: []
    cmd:
     - tasks.build #Note: Using depend to instead call manually.
     - tasks.run